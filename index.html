<style>
  :root {
    --bg: #0A0F1F;
    --text: #D0E0FF;
    --dim: #6B8AB8;
    --cyan: #00E5FF;
    --glow: #00E5FF;
  }
  
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    overflow-x: hidden;
  }

  header {
    padding: 3rem 5vw 2rem;
    border-bottom: 1px solid rgba(107,138,184,0.2);
    text-align: center;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 2.8rem;
    font-weight: 500;
    letter-spacing: 0.4em;
    color: var(--text);
    margin: 0;
  }

  .tagline {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    color: var(--dim);
    margin-top: 0.8rem;
    text-transform: uppercase;
  }

  .frame {
    position: relative;
    margin: 2rem 5vw;
    border: 1px solid rgba(107,138,184,0.3);
    min-height: 68vh;
    background: #0A0F1F;
  }

  model-viewer {
    width: 100%;
    height: 100%;
    min-height: 68vh;
    --poster-color: transparent;
  }

  .info {
    margin: 2rem 5vw;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    color: var(--dim);
    display: flex;
    flex-wrap: wrap;
    gap: 2.5rem;
  }

  .info div {
    line-height: 1.4;
  }

  .info strong {
    color: var(--text);
    display: block;
    font-size: 0.95rem;
  }

  footer {
    padding: 3rem 5vw;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim);
    border-top: 1px solid rgba(107,138,184,0.2);
    text-align: center;
  }
</style>
</head>
